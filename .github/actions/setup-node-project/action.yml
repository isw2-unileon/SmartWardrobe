name: 'Setup Node Project'
description: 'Install Node.js, configure cache, and install dependencies for Next.js'

# ── Inputs ─────────────────────────────────────────────────────────────────────
inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  work-dir:
    description: 'Directory where the package.json is located'
    required: false
    default: 'frontend'
  install-deps:
    description: 'Whether to run npm ci'
    required: false
    default: 'true'

# ── Steps ──────────────────────────────────────────────────────────────────────
runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: ${{ inputs.work-dir }}/package-lock.json

    - name: Install dependencies
      if: inputs.install-deps == 'true'
      shell: bash
      working-directory: ${{ inputs.work-dir }}
      run: npm ci