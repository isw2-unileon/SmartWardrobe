# ==============================================================================
# Workflow 01 — Continuous Integration (CI)
#
# PURPOSE: This is the CORE of CI. Every time someone pushes code or opens a
# pull request, automatically verify that:
#   1. The code compiles (no syntax errors)
#   2. All tests pass
#   3. Nobody broke anything
#
# This is the workflow that gives developers confidence to merge quickly.
#
# KEY CONCEPTS:
#   - actions/checkout      → Clones the repo onto the runner
#   - actions/setup-go      → Installs Go on the runner
#   - Branch protection     → Require this check to pass before merging a PR
#   - Job outputs & status  → Green ✅ or red ❌ on the PR page
# ==============================================================================

name: 01 · Continuous Integration

on:
  push:                      # Run on every push request (any branch)
  pull_request:              # Run on every pull request (any branch)
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      # ── Step 1: Dowload the code ────────────────────────────────────────────
      # Code is downloaded so that GitHub can view the folder . github.
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Get the code ────────────────────────────────────────────────
      # Called the composite action that encompasses all initial setup 
      # in a single block.
      - name: Setup project
        uses: ./.github/actions/setup-go-project
        with:
          work-dir: 'backend'

      # ── Step 4: Compile ─────────────────────────────────────────────────────
      # `go build` catches compilation errors BEFORE running tests.
      # The ./... pattern means "all packages in this module".
      - name: Build
        run: go build ./...

      # ── Step 5: Run tests ───────────────────────────────────────────────────
      # -race detects data races in concurrent code.
      # -count=1 disables test result caching (always re-run).
      - name: Run tests
        run: go test -race -count=1 ./...